<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Detroit Metro Territory Analysis</title>
<style>
/* ── Ranch Advisors brand tokens ── */
:root{
  --slate:    #2B393C;
  --cream:    #F8F1E9;
  --warmcream:#EDE6DC;
  --tanline:  #C9B889;
  --sage:     #7F9E96;
  --orange:   #F6AD55;
  --gold:     #C8A24A;
  --red:      #B15B49;
  --textmid:  #5A6A6E;
  --white:    #FFFFFF;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;overflow:hidden;
  font-family:"Outfit",Calibri,Arial,sans-serif;
  background:var(--cream);color:var(--slate);
}
body{display:flex;flex-direction:column;}

/* ── Header ─────────────────────────────────────────────── */
header{
  background:var(--slate);color:var(--cream);
  padding:8px 18px;
  display:flex;align-items:center;gap:12px;flex-shrink:0;
  border-bottom:2px solid var(--tanline);
}
header .hcopy h1{
  font-family:"Oswald",Arial Black,sans-serif;
  font-size:14px;font-weight:700;text-transform:uppercase;
  letter-spacing:0.06em;color:var(--cream);line-height:1.2;
}
header .hcopy p{
  font-family:"Outfit",Calibri,sans-serif;
  font-size:10px;color:var(--tanline);margin-top:1px;
}
.hbadge{
  background:var(--orange);color:var(--slate);
  font-family:"Oswald",Arial Black,sans-serif;
  font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:0.08em;padding:3px 8px;margin-left:auto;
  border:none;border-radius:0;
}

/* ── Layout ─────────────────────────────────────────────── */
.main{display:flex;flex:1;min-height:0;}
#map-wrap{flex:1;background:var(--warmcream);overflow:hidden;position:relative;}
#map-svg{width:100%;height:100%;display:block;cursor:default;}

/* ── Zip paths ───────────────────────────────────────────── */
.zp{cursor:pointer;}
.zp:hover{stroke:#fff !important;stroke-width:2 !important;opacity:1 !important;}
.cand{opacity:1;}

/* ── Tooltip ─────────────────────────────────────────────── */
#tooltip{
  position:fixed;pointer-events:none;z-index:100;
  background:var(--cream);border:1.5px solid var(--tanline);border-radius:0;
  padding:10px 13px;box-shadow:0 2px 8px rgba(43,57,60,0.12);
  min-width:190px;display:none;
}
#tooltip .tz{
  font-family:"Oswald",Arial Black,sans-serif;
  font-size:18px;font-weight:700;color:var(--slate);line-height:1;
}
#tooltip .tn{font-size:10px;color:var(--textmid);margin:2px 0 8px;}
#tooltip .tr{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:3px 0;border-bottom:1px solid var(--warmcream);
}
#tooltip .tr:last-child{border-bottom:none;}
#tooltip .trl{font-size:10px;color:var(--textmid);}
#tooltip .trv{font-size:11px;font-weight:600;color:var(--slate);}
#tooltip .trv.pur{color:var(--sage);}
#tooltip .trv.grn{color:var(--slate);}
#tooltip .cbar{height:3px;border-radius:0;margin-top:8px;}

/* ── Sidebar ─────────────────────────────────────────────── */
#sidebar{
  width:278px;flex-shrink:0;
  background:var(--cream);
  border-left:1.5px solid var(--tanline);
  display:flex;flex-direction:column;overflow:hidden;
}
.pane{padding:11px 13px;border-bottom:1px solid var(--tanline);flex-shrink:0;}
.ph3{
  font-family:"Oswald",Arial Black,sans-serif;
  font-size:10px;font-weight:700;color:var(--textmid);
  text-transform:uppercase;letter-spacing:0.1em;margin-bottom:7px;
}

/* ── Legend gradient ─────────────────────────────────────── */
.grad-bar{
  height:8px;border-radius:0;
  background:linear-gradient(to right,#F8F1E9,#7F9E96,#2B393C);
  margin-bottom:3px;
}
.grad-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--textmid);margin-bottom:9px;}
.leg-row{display:flex;align-items:center;gap:7px;font-size:11px;margin-top:4px;color:var(--slate);}
.leg-dot{width:11px;height:11px;border-radius:0;flex-shrink:0;}

/* ── Filter buttons ──────────────────────────────────────── */
.filter-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.filters{display:flex;gap:4px;flex-wrap:wrap;}
.fbtn{
  font-family:"Oswald",Arial Black,sans-serif;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;
  padding:4px 10px;
  border:1.5px solid var(--tanline);border-radius:0;
  background:var(--cream);cursor:pointer;color:var(--slate);
  transition:all 0.12s;
}
.fbtn:hover:not(.on){background:var(--warmcream);}
.fbtn.on.all{background:var(--slate);color:var(--cream);border-color:var(--slate);}
.fbtn.on.bailey{background:#22C55E;color:white;border-color:#22C55E;}
.fbtn.on.haley{background:#3B82F6;color:white;border-color:#3B82F6;}
.fbtn.on.both{background:#EF4444;color:white;border-color:#EF4444;}
.fbtn.on.unassigned{background:var(--textmid);color:white;border-color:var(--textmid);}

/* ── List tabs ───────────────────────────────────────────── */
.list-tabs{display:flex;gap:4px;margin-bottom:6px;}
.ltab,.ltog{
  font-family:"Oswald",Arial Black,sans-serif;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;
  padding:3px 9px;
  border:1.5px solid var(--tanline);border-radius:0;
  background:var(--cream);cursor:pointer;color:var(--textmid);
  transition:all 0.12s;
}
.ltab.on,.ltog.on{background:var(--slate);color:var(--cream);border-color:var(--slate);}

/* ── Reset button ────────────────────────────────────────── */
#reset-btn{
  font-family:"Oswald",Arial Black,sans-serif;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;
  padding:4px 9px;border:1.5px solid var(--tanline);border-radius:0;
  background:var(--cream);cursor:pointer;color:var(--textmid);transition:all 0.12s;
  white-space:nowrap;
}
#reset-btn:hover{background:var(--red);border-color:var(--red);color:white;}

/* ── Detail & list panels ────────────────────────────────── */
#detail{flex:1;overflow-y:auto;padding:11px 13px;font-size:12px;}
.ph{color:var(--textmid);text-align:left;padding:8px 0;font-size:11px;line-height:1.6;}
.dzip{
  font-family:"Oswald",Arial Black,sans-serif;
  font-size:22px;font-weight:700;color:var(--slate);
}
.dname{font-size:11px;color:var(--textmid);margin:1px 0 7px;}
.ctag{
  display:inline-block;font-size:10px;font-weight:700;
  font-family:"Oswald",Arial Black,sans-serif;text-transform:uppercase;
  letter-spacing:0.06em;
  padding:2px 8px;border-radius:0;margin-bottom:8px;color:white;
}
.abox{border:1.5px solid var(--tanline);padding:8px 10px;margin-bottom:9px;background:var(--warmcream);}
.albl{
  font-family:"Oswald",Arial Black,sans-serif;
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:0.06em;margin-bottom:1px;color:var(--slate);
}
.adesc{font-size:10px;color:var(--textmid);line-height:1.4;}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:9px;}
.sb{border:1.5px solid var(--tanline);padding:7px 9px;background:var(--warmcream);}
.sl{
  font-family:"Oswald",Arial Black,sans-serif;
  font-size:9px;color:var(--textmid);text-transform:uppercase;
  letter-spacing:0.06em;margin-bottom:1px;
}
.sv{font-family:"Oswald",Arial Black,sans-serif;font-size:15px;font-weight:700;color:var(--slate);}
.sv.pur{color:var(--sage);}
.sv.grn{color:var(--slate);}
.ss{font-size:10px;color:var(--textmid);}
.rb-lbl{font-size:10px;color:var(--textmid);margin-bottom:2px;}
.rb-bg{background:var(--warmcream);border-radius:0;height:5px;margin-bottom:9px;border:1px solid var(--tanline);}
.rb-fg{background:var(--sage);border-radius:0;height:5px;}
.tp-hd{
  font-family:"Oswald",Arial Black,sans-serif;
  font-size:10px;font-weight:700;color:var(--textmid);
  text-transform:uppercase;letter-spacing:0.08em;
  margin:10px 0 4px;padding-top:8px;
  border-top:1px solid var(--tanline);
}
.tp-hd:first-child{margin-top:0;padding-top:0;border-top:none;}
.tp-row{display:flex;align-items:center;gap:6px;padding:4px 2px;cursor:pointer;}
.tp-row:hover{background:var(--warmcream);}
.tp-zip{font-family:"Oswald",Arial Black,sans-serif;font-size:12px;font-weight:700;min-width:40px;color:var(--slate);}
.tp-name{font-size:10px;color:var(--textmid);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tp-stats{font-size:10px;color:var(--textmid);white-space:nowrap;}
.tl-hd{
  font-family:"Oswald",Arial Black,sans-serif;
  font-size:10px;font-weight:700;color:var(--textmid);
  text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px;
}
.tli{display:flex;align-items:center;gap:5px;padding:3px 0;border-bottom:1px solid var(--tanline);cursor:pointer;}
.tli:hover{background:var(--warmcream);}
.ti-r{font-family:"Oswald",Arial Black,sans-serif;font-size:10px;color:var(--tanline);width:13px;text-align:right;flex-shrink:0;}
.ti-z{font-family:"Oswald",Arial Black,sans-serif;font-size:11px;font-weight:700;width:34px;flex-shrink:0;color:var(--slate);}
.ti-b{flex:1;background:var(--warmcream);border-radius:0;height:4px;border:1px solid var(--tanline);}
.ti-f{background:var(--sage);border-radius:0;height:4px;}
.ti-v{font-size:10px;color:var(--textmid);width:38px;text-align:right;flex-shrink:0;}
.ti-pill{
  font-family:"Oswald",Arial Black,sans-serif;font-size:8px;font-weight:700;
  text-transform:uppercase;
  padding:1px 4px;border-radius:0;color:white;flex-shrink:0;min-width:18px;text-align:center;
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

const MAX_HHI=Math.max(...ALL.filter(d=>d.med_hhi>0).map(d=>d.med_hhi));

// ── Bivariate (AA × HHI) color scheme ──
// Row = AA level (0=low,1=med,2=high), Col = HHI level (0=low,1=med,2=high)
const BIV=[
  ['#F8F1E9','#EDE6DC','#C9B889'],  // low AA
  ['#D5CCBA','#A8BDB9','#7F9E96'],  // med AA
  ['#8BA89F','#4D7A71','#2B393C'],  // high AA  ← top-right = PRIME
];
const _aav=ALL.map(d=>d.aa_pct).sort((a,b)=>a-b);
const _hhv=ALL.filter(d=>d.med_hhi>0).map(d=>d.med_hhi).sort((a,b)=>a-b);
const AA_T33=_aav[Math.floor(_aav.length*0.33)];
const AA_T66=_aav[Math.floor(_aav.length*0.66)];
const HHI_T33=_hhv[Math.floor(_hhv.length*0.33)];
const HHI_T66=_hhv[Math.floor(_hhv.length*0.66)];
function bivFill(d){
  const ar=d.aa_pct>=AA_T66?2:d.aa_pct>=AA_T33?1:0;
  const hr=d.med_hhi>=HHI_T66?2:d.med_hhi>=HHI_T33?1:0;
  return BIV[ar][hr];
}
let listMode='aa';
let labelsOn=false;

// ── Color scale helpers ──
function lerpHex(c1,c2,t){
  const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
  const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
  return '#'+[r1+(r2-r1)*t,g1+(g2-g1)*t,b1+(b2-b1)*t].map(v=>Math.round(v).toString(16).padStart(2,'0')).join('');
}
function aaFill(d){
  const t=d.black_pop/MAX_BP;
  if(t<0.5) return lerpHex('#C8C3BA','#7F9E96',t*2);
  return lerpHex('#7F9E96','#2B393C',(t-0.5)*2);
}
function hhiFill(d){
  if(d.med_hhi<=0) return '#C8C3BA';
  const t=d.med_hhi/MAX_HHI;
  if(t<0.5) return lerpHex('#C8C3BA','#C8A24A',t*2);
  return lerpHex('#C8A24A','#2B393C',(t-0.5)*2);
}
function updateMapColors(){
  document.querySelectorAll('.zp').forEach(el=>{
    const d=ALL.find(z=>z.zip===el.dataset.zip);
    if(!d) return;
    let fill;
    if(listMode==='hhi') fill=hhiFill(d);
    else if(listMode==='bivariate') fill=bivFill(d);
    else fill=aaFill(d);
    el.setAttribute('fill',fill);
    el.style.opacity='1';
  });
}
function updateLegend(){
  const title=document.getElementById('legend-title');
  const bar=document.getElementById('grad-bar');
  const lbl=document.getElementById('grad-lbl');
  if(listMode==='bivariate'){
    if(title) title.textContent='AA Population x Median HHI';
    if(bar){
      bar.style.background='none';
      var bh='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:2px;height:54px">';
      var lbs=['Low','Med','High'];
      [2,1,0].forEach(function(ar){[0,1,2].forEach(function(hr){
        bh+='<div style="background:'+BIV[ar][hr]+';border-radius:2px" title="'+lbs[ar]+' AA / '+lbs[hr]+' HHI"></div>';
      });});
      bh+='</div><div style="display:flex;justify-content:space-between;font-size:9px;color:#bbb;margin-top:2px"><span>Low HHI</span><span>High HHI</span></div><div style="font-size:9px;color:#bbb;text-align:right">High AA above</div>';
      bar.innerHTML=bh;
    }
    if(lbl) lbl.innerHTML='<span style="color:#2B393C;font-weight:600">Dark slate = high AA + high income</span>';
  } else if(listMode==='hhi'){
    if(title) title.textContent='Median HHI (fill color)';
    if(bar){bar.innerHTML='';bar.style.background='linear-gradient(to right,#F8F1E9,#7F9E96,#2B393C)';}
    if(lbl) lbl.innerHTML='<span>$0</span><span>$50K</span><span>$100K</span><span>$150K+</span>';
  } else {
    if(title) title.textContent='AA Residents (fill color)';

  }
}

function setListMode(m){
  listMode=m;
  ['list-plan','list-aa','list-hhi','list-biv'].forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.classList.remove('on');
  });
  var activeTab=document.getElementById(m==='plan'?'list-plan':m==='aa'?'list-aa':m==='hhi'?'list-hhi':'list-biv');
  if(activeTab) activeTab.classList.add('on');
  updateMapColors();
  updateLegend();
  if(m==='plan'){
    showTerritoryPlan();
  } else {
    document.getElementById('detail').innerHTML=
      '<div class="tl-hd" id="list-heading" style="margin-top:4px">'
      +(m==='aa'?'Top 20 by AA Residents':m==='hhi'?'Top 20 by Median HHI':'Top 20: AA x HHI Score')
      +'</div><div id="top-list"></div>';
    buildTopList();
  }
}

function toggleLabels(){
  labelsOn=!labelsOn;
  const lg=document.getElementById('labels-g');
  if(labelsOn){
    document.querySelectorAll('.zp').forEach(el=>{
      const bb=el.getBBox();
      const t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',(bb.x+bb.width/2).toFixed(1));
      t.setAttribute('y',(bb.y+bb.height/2).toFixed(1));
      t.setAttribute('text-anchor','middle');
      t.setAttribute('dominant-baseline','central');
      t.setAttribute('font-size','4.5');
      t.setAttribute('font-family','Outfit,Calibri,sans-serif');
      t.setAttribute('fill','#1a1a1a');
      t.setAttribute('pointer-events','none');
      t.textContent=el.dataset.zip;
      lg.appendChild(t);
    });
    document.getElementById('lbl-btn').classList.add('on');
    document.getElementById('lbl-btn').textContent='Hide labels';
  } else {
    lg.innerHTML='';
    document.getElementById('lbl-btn').classList.remove('on');
    document.getElementById('lbl-btn').textContent='Zip labels';
  }
}

const tip=document.getElementById('tooltip');
let tipVisible=false;

function showTip(p,mx,my){
  document.getElementById('tt-zip').textContent=p.zip;
  document.getElementById('tt-name').textContent=NAMES[p.zip]||'Detroit Metro Area';
  document.getElementById('tt-aapop').textContent=p.black_pop.toLocaleString();
  document.getElementById('tt-aapct').textContent=p.aa_pct+'%';
  document.getElementById('tt-hhi').textContent=fmtM(p.med_hhi);
  const c=p.candidate;
  document.getElementById('tt-bar').style.background=CC[c]==='#9ca3af'?'#e0e0e0':CC[c];
  tip.style.display='block';
  tipVisible=true;
  moveTip(mx,my);
}

function moveTip(mx,my){
  const tw=tip.offsetWidth,th=tip.offsetHeight;
  let tx=mx+14,ty=my-10;
  if(tx+tw>window.innerWidth-10) tx=mx-tw-10;
  if(ty+th>window.innerHeight-10) ty=my-th-10;
  tip.style.left=tx+'px';tip.style.top=ty+'px';
}

function hideTip(){tip.style.display='none';tipVisible=false;}

// --- Filter ---
let activeF=new Set(['all']);
document.querySelectorAll('.fbtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const f=btn.dataset.f;
    if(f==='all'){
      activeF=new Set(['all']);
    } else {
      if(activeF.has(f)&&activeF.size===1){activeF=new Set(['all']);}
      else{activeF=new Set([f]);}
    }
    document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('on',activeF.has(b.dataset.f)));
    applyFilter();
  });
});

      el.style.display='';

      el.setAttribute('stroke-width', CSW[cand]);
      return;
    }
    // Highlight selected territory via stroke-width only — never touch opacity or display
    var match;
    if(sb) match=(cand==='bailey'||cand==='both');

    else if(sboth) match=(cand==='both');
    else if(su) match=(cand==='none');
    else match=true;
    el.style.display='';
    el.style.opacity='1';
    if(sa||match){
      el.setAttribute('stroke-width', CSW[cand]);
    } else {
      el.setAttribute('stroke-width', '0.3');
    }
  });
}

// --- Reset ---
const INIT_VX=0,INIT_VY=0,INIT_VW=900,INIT_VH=620;
document.getElementById('reset-btn').addEventListener('click',()=>{
  // Reset zoom
  vx=INIT_VX;vy=INIT_VY;vw=INIT_VW;vh=INIT_VH;
  document.getElementById('map-svg').setAttribute('viewBox',`${vx} ${vy} ${vw} ${vh}`);
  // Reset filters
  activeF=new Set(['all']);
  document.querySelectorAll('.zp').forEach(function(el){el.style.display='';});
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('on',activeF.has(b.dataset.f)));
  applyFilter();
  // Reset stroke highlights
  document.querySelectorAll('.zp').forEach(e=>{
    e.setAttribute('stroke',CSC[e.dataset.c]);
    e.setAttribute('stroke-width',CSW[e.dataset.c]);
  });
  // Reset list mode
  listMode='plan';
  ['list-aa','list-hhi','list-biv'].forEach(function(id){var el=document.getElementById(id);if(el)el.classList.remove('on');});
  var planBtn=document.getElementById('list-plan');if(planBtn)planBtn.classList.add('on');
  updateMapColors();
  updateLegend();
  // Reset labels
  if(labelsOn) toggleLabels();
  // Reset detail panel
  document.getElementById('detail').innerHTML=`
    <div class="ph">Hover any zip to preview.<br>Click to pin details &amp; system analog.</div>
    <div class="tl-hd" id="list-heading" style="margin-top:4px">Top 20 by Absolute AA Residents</div>
    <div id="top-list"></div>`;
  buildTopList();
});

// --- Path interactions ---
document.querySelectorAll('.zp').forEach(el=>{
  el.addEventListener('mousemove',e=>{
    const p=ALL.find(d=>d.zip===el.dataset.zip);
    if(p) showTip(p,e.clientX,e.clientY);
  });
  el.addEventListener('mouseleave',()=>hideTip());
  el.addEventListener('click',e=>{
    hideTip();
    const z=el.dataset.zip,p=ALL.find(d=>d.zip===z);
    if(p) showDetail(p);
    document.querySelectorAll('.zp').forEach(pe=>{
      if(pe.dataset.zip===z){pe.setAttribute('stroke','#fff');pe.setAttribute('stroke-width','4');}
      else{pe.setAttribute('stroke',CSC[pe.dataset.c]);pe.setAttribute('stroke-width',CSW[pe.dataset.c]);}
    });
  });
});

function showDetail(p){
  const rank=ALL.findIndex(d=>d.zip===p.zip)+1;
  const name=NAMES[p.zip]||'Detroit Metro';
  const c=p.candidate,cc=CC[c];
  const pct=Math.min((p.black_pop/MAX_BP)*100,100).toFixed(1);
  const an=ANALOG[p.zip];
  const hc=p.med_hhi>=80000?'grn':'';
  document.getElementById('detail').innerHTML=`
    <div class="dzip">${p.zip}</div>
    <div class="dname">${name}</div>
    <span class="ctag" style="background:${cc}">${CL[c]}</span>
    <div class="abox" style="background:${an.color}15;border:1px solid ${an.color}40">
      <div class="albl" style="color:${an.color}">System Analog: ${an.label}</div>
      <div class="adesc">${an.desc}</div>
    </div>
    <div class="sg">
      <div class="sb"><div class="sl">AA Residents</div><div class="sv pur">${p.black_pop.toLocaleString()}</div><div class="ss">Absolute TAM</div></div>
      <div class="sb"><div class="sl">% African American</div><div class="sv">${p.aa_pct}%</div><div class="ss">of total pop</div></div>
      <div class="sb"><div class="sl">Median HHI</div><div class="sv ${hc}">${fmtM(p.med_hhi)}</div><div class="ss">spending power</div></div>
      <div class="sb"><div class="sl">Total Population</div><div class="sv">${p.total_pop.toLocaleString()}</div><div class="ss">all residents</div></div>
    </div>
    <div class="rb-lbl">AA residents vs. metro max &mdash; #${rank} of ${ALL.length}</div>
    <div class="rb-bg"><div class="rb-fg" style="width:${pct}%"></div></div>
    <div class="tl-hd" style="margin-top:10px">Top 15 by AA Residents</div>
    ${ALL.slice(0,15).map((d,i)=>{
      const w=Math.min((d.black_pop/MAX_BP)*100,100).toFixed(1);
      const dc=d.candidate,pb=dc==='none'?'#e0e0e0':CC[dc],pt=dc==='none'?'#888':'white';
      const pl=dc==='none'?'—':dc==='both'?'B+H':dc==='bailey'?'B':'H';
      const sel=d.zip===p.zip;
      return '<div class="tli" onclick="cL(\''+d.zip+'\')">'
        +'<span class="ti-r">'+(i+1)+'</span>'
        +'<span class="ti-z" style="'+(sel?'color:#7F9E96':'')+'">'+d.zip+'</span>'
        +'<div class="ti-b"><div class="ti-f" style="width:'+w+'%"></div></div>'
        +'<span class="ti-v">'+fmt(d.black_pop)+'</span>'
        +'<span class="ti-pill" style="background:'+pb+';color:'+pt+'">'+pl+'</span>'
        +'</div>';
    }).join('')}`;
}

function cL(zip){const p=ALL.find(d=>d.zip===zip);if(p)showDetail(p);}

function tpScore(d){return d.med_hhi>0?(d.aa_pct/100)*(d.med_hhi/MAX_HHI):0;}

function tpRow(d){
  var name=(NAMES[d.zip]||'Detroit Metro').split(',')[0];
  return '<div class="tp-row" onclick="cL('+JSON.stringify(d.zip)+')">'
    +'<span class="tp-zip">'+d.zip+'</span>'
    +'<span class="tp-name">'+name+'</span>'
    +'<span class="tp-stats">'+d.aa_pct+'% &nbsp;'+fmtM(d.med_hhi)+'</span>'
    +'</div>';
}

function showTerritoryPlan(){
  var haley=ALL.filter(function(d){return d.candidate==='haley';}).sort(function(a,b){return tpScore(b)-tpScore(a);});
  var both=ALL.filter(function(d){return d.candidate==='both';}).sort(function(a,b){return tpScore(b)-tpScore(a);});
  var avail=ALL.filter(function(d){return d.candidate==='none'&&d.med_hhi>0;}).sort(function(a,b){return tpScore(b)-tpScore(a);}).slice(0,12);
  var bailey=ALL.filter(function(d){return d.candidate==='bailey';}).sort(function(a,b){return tpScore(b)-tpScore(a);});
  var html='<div style="padding:4px 13px 12px">';
  html+='<div class="tp-hd" style="color:#C8A24A;border-top:none;padding-top:0;margin-top:0">Haley Confirmed ('+haley.length+')</div>';
  haley.forEach(function(d){html+=tpRow(d);});
  html+='<div class="tp-hd" style="color:#B15B49">Overlap — Give to Haley ('+both.length+')</div>';
  html+='<div style="font-size:10px;color:#bbb;margin-bottom:5px">Both candidates want these — recommend assigning to Haley.</div>';
  both.forEach(function(d){html+=tpRow(d);});
  html+='<div class="tp-hd">Best Available to Add to Haley (top 12)</div>';
  html+='<div style="font-size:10px;color:#bbb;margin-bottom:5px">Ranked by AA% x Median HHI — highest opportunity zips not yet claimed.</div>';
  avail.forEach(function(d){html+=tpRow(d);});
  html+='<div class="tp-hd" style="color:#7F9E96">Bailey Territory FYI ('+bailey.length+')</div>';
  bailey.forEach(function(d){html+=tpRow(d);});
  html+='</div>';
  document.getElementById('detail').innerHTML=html;
}

function buildTopList(){
  const el=document.getElementById('top-list');
  if(!el) return;
  if(listMode==='bivariate'){
    var maxAA=Math.max.apply(null,ALL.map(function(z){return z.aa_pct;}));
    var bivScored=ALL.filter(function(d){return d.med_hhi>0;}).map(function(d){
      return {zip:d.zip,aa_pct:d.aa_pct,med_hhi:d.med_hhi,black_pop:d.black_pop,candidate:d.candidate,score:(d.aa_pct/maxAA)*(d.med_hhi/MAX_HHI)};
    }).sort(function(a,b){return b.score-a.score;}).slice(0,20);
    var bivHTML='';
    var topScore=bivScored[0]?bivScored[0].score:1;
    bivScored.forEach(function(d,i){
      var w=Math.min((d.score/topScore)*100,100).toFixed(1);
      var dc=d.candidate,pb=dc==='none'?'#e0e0e0':CC[dc],pt=dc==='none'?'#888':'white';
      var pl=dc==='none'?'--':dc==='both'?'B+H':dc==='bailey'?'B':'H';
      var fc=bivFill(d);
      bivHTML+='<div class="tli" onclick="cL('+JSON.stringify(d.zip)+')">'
        +'<span class="ti-r">'+(i+1)+'</span>'
        +'<span class="ti-z">'+d.zip+'</span>'
        +'<div class="ti-b"><div class="ti-f" style="width:'+w+'%;background:'+fc+'"></div></div>'
        +'<span class="ti-v">'+d.aa_pct+'%/'+Math.round(d.med_hhi/1000)+'K</span>'
        +'<span class="ti-pill" style="background:'+pb+';color:'+pt+'">'+pl+'</span>'
        +'</div>';
    });
    el.innerHTML=bivHTML;
  } else if(listMode==='hhi'){
    const sorted=[...ALL].filter(d=>d.med_hhi>0).sort((a,b)=>b.med_hhi-a.med_hhi).slice(0,20);
    el.innerHTML=sorted.map((d,i)=>{
      const w=Math.min((d.med_hhi/MAX_HHI)*100,100).toFixed(1);
      const dc=d.candidate,pb=dc==='none'?'#e0e0e0':CC[dc],pt=dc==='none'?'#888':'white';
      const pl=dc==='none'?'—':dc==='both'?'B+H':dc==='bailey'?'B':'H';
      return '<div class="tli" onclick="cL(\''+d.zip+'\')">'
        +'<span class="ti-r">'+(i+1)+'</span>'
        +'<span class="ti-z">'+d.zip+'</span>'
        +'<div class="ti-b"><div class="ti-f" style="width:'+w+'%;background:#C8A24A"></div></div>'
        +'<span class="ti-v">'+(d.med_hhi>=1000?'$'+(d.med_hhi/1000).toFixed(0)+'K':'N/A')+'</span>'
        +'<span class="ti-pill" style="background:'+pb+';color:'+pt+'">'+pl+'</span>'
        +'</div>';
    }).join('');
  } else {
    el.innerHTML=ALL.slice(0,20).map((d,i)=>{
      const w=Math.min((d.black_pop/MAX_BP)*100,100).toFixed(1);
      const dc=d.candidate,pb=dc==='none'?'#e0e0e0':CC[dc],pt=dc==='none'?'#888':'white';
      const pl=dc==='none'?'—':dc==='both'?'B+H':dc==='bailey'?'B':'H';
      return '<div class="tli" onclick="cL(\''+d.zip+'\')">'
        +'<span class="ti-r">'+(i+1)+'</span>'
        +'<span class="ti-z">'+d.zip+'</span>'
        +'<div class="ti-b"><div class="ti-f" style="width:'+w+'%"></div></div>'
        +'<span class="ti-v">'+fmt(d.black_pop)+'</span>'
        +'<span class="ti-pill" style="background:'+pb+';color:'+pt+'">'+pl+'</span>'
        +'</div>';
    }).join('');
  }
}
showTerritoryPlan();

// --- Pan / zoom ---
let vx=0,vy=0,vw=900,vh=620,drag=false,sx,sy,svx,svy;
const svg=document.getElementById('map-svg');
function setV(){svg.setAttribute('viewBox',`${vx} ${vy} ${vw} ${vh}`);}
svg.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=svg.getBoundingClientRect();
  const mx=(e.clientX-rect.left)/rect.width;
  const my=(e.clientY-rect.top)/rect.height;
  const factor=e.deltaY>0?1.15:0.87;
  const nvw=Math.min(900,Math.max(150,vw*factor));
  const nvh=Math.min(620,Math.max(100,vh*factor));
  vx=vx+mx*(vw-nvw);
  vy=vy+my*(vh-nvh);
  vw=nvw;vh=nvh;
  setV();
},{passive:false});
svg.addEventListener('mousedown',e=>{
  drag=true;sx=e.clientX;sy=e.clientY;svx=vx;svy=vy;
  svg.style.cursor='grabbing';
  e.preventDefault();
});
document.addEventListener('mousemove',e=>{
  if(!drag) return;
  const rect=svg.getBoundingClientRect();
  const scx=vw/rect.width,scy=vh/rect.height;
  vx=svx-(e.clientX-sx)*scx;
  vy=svy-(e.clientY-sy)*scy;
  setV();
});
document.addEventListener('mouseup',()=>{drag=false;svg.style.cursor='';});
</script>
